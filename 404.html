<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">404 Not Found</h1>
        <p id="message"></p>
        <p><span id="timer">5</span> <span id="unit">seconds</span></p>
        <a href="/" id="link"></a>
    </div>

    <script>
        // 表示する文言の定義
        const contents = {
            ja: {
                title: "404 ページが見つかりません",
                message: "お探しのページは見つかりませんでした。",
                unit: "秒後にトップページへ転送されます。",
                link: "トップページへ戻る"
            },
            en: {
                title: "404 Not Found",
                message: "The page you are looking for could not be found.",
                unit: "seconds until redirect to home.",
                link: "Return to home page"
            }
        };

        // ブラウザの言語判定（日本語なら'ja'、それ以外は'en'）
        const lang = (navigator.language.startsWith('ja')) ? 'ja' : 'en';
        const data = contents[lang];

        // 画面への適用
        document.getElementById('title').innerText = data.title;
        document.getElementById('message').innerText = data.message;
        document.getElementById('unit').innerText = data.unit;
        document.getElementById('link').innerText = data.link;
        document.getElementById('link').href = "/";

        // リダイレクト処理
        let count = 5;
        const timerEl = document.getElementById('timer');

        const redirect = () => {
            if (count > 0) {
                timerEl.innerText = count;
                count--;
                setTimeout(redirect, 1000);
            } else {
                window.location.href = '/';
            }
        };
        window.onload = redirect;
    </script>
</body>
</html>
